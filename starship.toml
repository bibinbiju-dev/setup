
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$shell\
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_status\
$nodejs\
$python\
$time\n  \
[уұһӘ](fg:iris) \
"""

palette = "rose-pine"

[palettes.rose-pine]
overlay = '#26233a'
love = '#ff79c6'
gold = '#ff5555'
rose = '#50fa7b'
pine = '#f1fa8c'
foam = '#88b3fa'
iris = '#8be9fd'

[os]
format = "[оӮ¶](fg:overlay)[ $symbol ]($style)"
style = "bg:overlay fg:foam"
disabled = false

[os.symbols]
Arch = "у°ЈҮ"

[shell]
format = "[ $indicator ]($style)[оӮҙ](fg:overlay) "
fish_indicator = "у°Ҳә"
style = "bg:overlay fg:rose"
disabled = false

[directory]
format = "[оӮ¶](fg:overlay)[ $path ]($style)[оӮҙ](fg:overlay) "
style = "bg:overlay fg:pine"
truncation_length = 5
truncation_symbol = "вҖҰ/"

[directory.substitutions]
Documents = "у°Ҳҷ"
Downloads = "пҖҷ "
Music = "пҖҒ "
Pictures = "пҖҫ "

[fill]
style = "fg:overlay"
symbol = " "

[git_branch]
format = "[оӮ¶](fg:overlay)[ $symbol $branch ]($style)[оӮҙ](fg:overlay) "
style = "bg:overlay fg:foam"
symbol = "пҗҳ"

# [git_commit]
# format = "[оӮ¶](fg:overlay)[ у°ңҳ $hash ]($style)[оӮҙ](fg:overlay) "
# style = "bg:overlay fg:foam"
# tag_symbol = " у°“ј "
# only_detached = false
#
[git_status]
disabled = false
style = "bg:overlay fg:love"
format = '[оӮ¶](fg:overlay)([$all_status$ahead_behind]($style))[оӮҙ](fg:overlay) '
up_to_date = '[ у°„ӯ ](bg:overlay fg:iris)'
untracked = '[?\($count\)](bg:overlay fg:rose)'
stashed = '[\$](bg:overlay fg:iris)'
modified = '[!\($count\)](bg:overlay fg:gold)'
renamed = '[В»\($count\)](bg:overlay fg:iris)'
deleted = '[вңҳ\($count\)](style)'
staged = '[++\($count\)](bg:overlay fg:gold)'
ahead = '[вҮЎ\(${count}\)](bg:overlay fg:foam)'
diverged = 'вҮ•[\[](bg:overlay fg:iris)[вҮЎ\(${ahead_count}\)](bg:overlay fg:foam)[вҮЈ\(${behind_count}\)](bg:overlay fg:rose)[\]](bg:overlay fg:iris)'
behind = '[вҮЈ\(${count}\)](bg:overlay fg:rose)'

[time]
disabled = true
format = " [оӮ¶](fg:overlay)[ $time пү’ ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:rose"
time_format = "%I:%M%P"
use_12hr = true


[username]
disabled = true
format = "[оӮ¶](fg:overlay)[ о·…  $user ]($style)[оӮҙ](fg:overlay) "
show_always = true
style_root = "bg:overlay fg:iris"
style_user = "bg:overlay fg:iris"

[hostname]
ssh_only = false
ssh_symbol = "уұ“һ "
format = "[оӮ¶](fg:overlay)[ $ssh_symbol $hostname ]($style)[оӮҙ](fg:overlay) "
style = "bg:overlay fg:iris"
disabled = true

# Languages

[c]
style = "bg:overlay fg:pine"
format = " [оӮ¶](fg:overlay)[ $symbol$version ]($style)[оӮҙ](fg:overlay)"
disabled = true
symbol = "оҳһ "

[nodejs]
style = "bg:overlay fg:pine"
format = " [оӮ¶](fg:overlay)[ $symbol$version ]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = "у°Һҷ "

[python]
style = "bg:overlay fg:pine"
format = " [оӮ¶](fg:overlay)[ $symbol$version ]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = 'оңј '



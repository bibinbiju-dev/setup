"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](bg:peach fg:surface0)\
[](bg:peach fg:surface0)\
$directory\
[Óāį](fg:peach bg:green)\
$git_branch\
$git_status\
[Óāį](fg:green bg:teal)\
$c\
$nodejs\
$python\
[Óāį](fg:teal bg:blue)\
$docker_context\
[Óāį](fg:blue bg:pink)\
$time\
[Óāī ](fg:pink)\
$line_break$character"""

palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
orange = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[directory]
style = "fg:mantle bg:peach"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ůįĚö "
"Pictures" = "ÔÄĺ "
"Developer" = "ůį≤č "

[git_branch]
symbol = "Ôźė"
style = "bg:teal"
format = '[[ $symbol $branch ](fg:base bg:green)]($style)'

[git_status]
style = "bg:teal"
format = '[[($all_status$ahead_behind )](fg:base bg:green)]($style)'

[nodejs]
symbol = "Óúė"
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:base bg:teal)]($style)'

[c]
symbol = "Óėě "
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:base bg:teal)]($style)'

[python]
symbol = "ÓėÜ"
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:base bg:teal)]($style)'

[docker_context]
symbol = "ÔĆą"
style = "bg:mantle"
format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg3)]($style)'

[time]
disabled = false
# time_format = "%R"
time_format = "%I:%M %p"
style = "pink"
format = '[[ Ôźļ $time ](fg:mantle bg:pink)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[Ôź≤](bold fg:green)'
error_symbol = '[Ôź≤](bold fg:red)'
vimcmd_symbol = '[Ôźī](bold fg:creen)'
vimcmd_replace_one_symbol = '[Ôźī](bold fg:purple)'
vimcmd_replace_symbol = '[Ôźī](bold fg:purple)'
vimcmd_visual_symbol = '[Ôźī](bold fg:lavender)'

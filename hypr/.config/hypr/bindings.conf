# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER, B, Browser, exec, omarchy-launch-browser
# bindd = SUPER SHIFT, Z, Browser, exec, firefox
bindd = SUPER SHIFT, B, Browser (private), exec, omarchy-launch-browser --private
#bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
#bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
#bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
#bindd = SUPER SHIFT, X, suspend, exec, systemctl suspend 
#volume and brightness control 
bindd = SUPER,F3, Volume up, exec, $osdclient --output-volume raise
bindd = SUPER,F2, Volume down, exec, $osdclient --output-volume lower
bindd = SUPER,F1, Mute, exec, $osdclient --output-volume mute-toggle
bindd = SUPER,F4, Mute microphone, exec, $osdclient --input-volume mute-toggle
bindd = SUPER,F6, Brightness up, exec, $osdclient --brightness raise
bindd = SUPER,F5, Brightness down, exec, $osdclient --brightness lower

bindld = ,F11, Keyboard backlight cycle, exec, omarchy-brightness-keyboard cycle

#volume and brightness control precise 
bindd = ALT, F2, Volume down precise, exec, $osdclient --output-volume -1
bindeld = ALT, F6, Brightness up precise, exec, $osdclient --brightness +1
bindeld = ALT, F5, Brightness down precise, exec, $osdclient --brightness -1
bindd = ALT, F3, Volume up precise, exec, $osdclient --output-volume +1
bindld = SUPER, F4, Switch audio output, exec, omarchy-cmd-audio-switch


bindd = , F7, Previous track, exec, $osdclient --playerctl previous
bindd = , F8, Play/Pause, exec, $osdclient --playerctl play-pause
bindd = , F9, Next track, exec, $osdclient --playerctl next
bindd = , F10, Stop, exec, $osdclient --playerctl stop

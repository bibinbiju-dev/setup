source = ~/.config/omarchy/current/theme/hyprlock.conf
background {
    monitor =
    path = ~/.config/omarchy/current/background
    blur_size = 8
    blur_passes = 3
    brightness = 0.7
    color = $color
}
input-field {
    monitor =
    size = 270, 40

    dots_size = 0.22
    dots_spacing = 0.14
    dots_center = true
    dots_rounding = -1

    outline_thickness = 3
    inner_color = $inner_color
    outer_color = $outer_color
    font_color = $font_color

    check_color = $check_color
    fail_color = rgba(ff6060ee)

    fade_on_empty = true
    fade_timeout = 1000
    hide_input = false
    placeholder_text = <i><span foreground="##ffffff"> Enter Password</span></i>
    fade_on_empty = false

    position = 0,-40
    halign = center
    valign = center
    rounding = 5
}

# -------- CLOCK --------
label {
    monitor =
    text = $TIME
    color = $font_color
    font_size = 65
    font_family = JetBrainsMonoNL Nerd Font

    position = 0, 340
    halign = center
    valign = center

    shadow_passes = 3
    shadow_size = 4
}

# -------- DATE --------
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = $font_color
    font_size = 17
    font_family = JetBrainsMonoNL Nerd Font

    position = 0, 280
    halign = center
    valign = center
}

animations {
    enabled = true
}

auth {
    fingerprint:enabled = true
}

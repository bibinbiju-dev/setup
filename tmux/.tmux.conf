##### PREFIX #####
set -g prefix C-Space          # Leader = Ctrl+Space
set -g prefix2 C-s             # Secondary leader = Ctrl+s
bind C-Space send-prefix       # Send prefix to nested tmux

##### RELOAD CONFIG #####
bind q source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"   # Prefix + q → reload config

##### GENERAL SETTINGS #####
set -g default-terminal "tmux-256color"   # True color
set -ga terminal-overrides ",*:RGB"
set -g mouse on                           # Enable mouse
set -g base-index 1                       # Windows start at 1
setw -g pane-base-index 1                 # Panes start at 1
set -g renumber-windows on                # Auto renumber
set -g history-limit 50000                # Scrollback size
set -g escape-time 0                      # No escape delay
set -g focus-events on
set -g set-clipboard on                   # Copy to system clipboard
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off
set -g visual-activity off

##### STATUS BAR #####
set -g status on
set -g status-position top
set -g status-interval 5

##### SPLITS #####
bind v split-window -h -c "#{pane_current_path}"   # Prefix + v → vertical split
bind h split-window -v -c "#{pane_current_path}"   # Prefix + h → horizontal split
bind x kill-pane                                   # Prefix + x → close pane

##### VIM-TMUX-NAVIGATOR #####
# Ctrl+h/j/k/l → move between vim & tmux panes
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE 'n?vim'"

bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

##### PANE RESIZING #####
# Alt+h/j/k/l → resize pane
bind -n M-h resize-pane -L 5
bind -n M-l resize-pane -R 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5

##### WINDOW MANAGEMENT #####
bind r command-prompt -I "#W" "rename-window -- '%%'"   # Prefix + r → rename window
bind c new-window -c "#{pane_current_path}"             # Prefix + c → new window
bind k kill-window                                      # Prefix + k → close window

# Alt+1..9 → switch windows
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

##### SESSION MANAGEMENT #####
bind R command-prompt -I "#S" "rename-session -- '%%'"  # Prefix + R → rename session
bind C new-session -c "#{pane_current_path}"            # Prefix + C → new session
bind K kill-session                                     # Prefix + K → kill session
bind P switch-client -p                                 # Prefix + P → prev session
bind N switch-client -n                                 # Prefix + N → next session

##### VI COPY MODE #####
setw -g mode-keys vi                     # Use vim keys in copy mode
# Prefix + [ → enter copy mode
# v → start selection
# y → copy & exit
# r → toggle rectangle
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send -X rectangle-toggle



##### THEME (from first config) #####
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?client_prefix,PREFIX ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue

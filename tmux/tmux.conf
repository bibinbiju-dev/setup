set -g prefix C-Space
set -g prefix2 C-s
bind C-Space send-prefix

bind q source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"   # Prefix + q → reload config

##### GENERAL SETTINGS #####
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

##### STATUS BAR #####
set -g status on
set -g status-position top
set -g status-interval 5

##### SPLITS #####
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
bind x kill-pane

##### VIM-TMUX-NAVIGATOR #####
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE 'n?vim'"

bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

##### PANE RESIZING #####
bind -n M-h resize-pane -L 5
bind -n M-l resize-pane -R 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5

##### WINDOW MANAGEMENT #####
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

# Alt+1..9 → switch windows
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1


##### SESSION MANAGEMENT #####
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n
bind -n M-Up switch-client -n
bind -n M-Down switch-client -p
##### VI COPY MODE #####
setw -g mode-keys vi                     # Use vim keys in copy mode
# Prefix + [ → enter copy mode
# v → start selection
# y → copy & exit
# r → toggle rectangle
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send -X rectangle-toggle


##### STATUS BAR #####
set -g status-style "bg=#121212,fg=#f8f8f2"

# LEFT: Session + window info
set -g status-left-length 100
set -g status-left "\
#[fg=#282a36,bg=#bd93f9,bold] #S \
#[fg=#bd93f9,bg=#44475a]\
#[fg=#8be9fd,bg=#44475a] #(basename \"#{pane_current_path}\") \
#[fg=#44475a,bg=#282a36]\
"
# RIGHT: useful info
set -g status-right-length 100
set -g status-right "\
#[fg=#50fa7b]#(whoami) \
#[fg=#ff5555]#{?client_prefix,PREFIX,} \
"
setw -g window-status-format "#[fg=#6272a4] #I:#W "
setw -g window-status-current-format "#[fg=#50fa7b,bold] #I:#W "

set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"

set -g message-style "bg=#282a36,fg=#8be9fd"
set -g message-command-style "bg=#282a36,fg=#ff79c6"

set -g mode-style "bg=#44475a,fg=#f8f8f2"

